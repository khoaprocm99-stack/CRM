{% extends "edu/base_edu.html" %}
{% block title %}Thu học phí{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-cash-coin me-2"></i>Ghi nhận thanh toán học phí</h1>
</div>
<div class="bg-white rounded-3 shadow-sm p-4" style="max-width:600px">
  <form method="post">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label fw-semibold">Đăng ký học *</label>
        <select name="enrollment_id" class="form-select" required id="enrollSelect">
          <option value="">— Chọn học viên / lớp —</option>
          {% for e in enroll_list %}
          <option value="{{ e.EnrollmentID }}" data-remaining="{{ e.remaining }}">
            {{ e.student }} — {{ e.ClassName }}
            (Còn nợ: {{ "{:,.0f}".format(e.remaining) }} ₫)
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Số tiền (VND) *</label>
        <input type="number" name="amount" id="amountInput" class="form-control" min="1" required>
        <div class="form-text" id="remainingHint"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Ngày thanh toán</label>
        <input type="date" name="payment_date" class="form-control"
               value="{{ now.strftime('%Y-%m-%d') if now is defined else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Hình thức</label>
        <select name="method" class="form-select">
          {% for m in ['Tiền mặt','Chuyển khoản','Thẻ'] %}
          <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Nhân viên thu</label>
        <select name="staff_id" class="form-select">
          <option value="">— Chọn —</option>
          {% for s in staff_list %}
          <option value="{{ s.StaffID }}">{{ s.FullName }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Ghi chú</label>
        <input type="text" name="note" class="form-control" placeholder="VD: Đóng 50% đợt 1">
      </div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-success">
        <i class="bi bi-check-lg me-1"></i>Xác nhận thu
      </button>
      <a href="{{ url_for('edu_payments') }}" class="btn btn-outline-secondary">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const sel = document.getElementById('enrollSelect');
const amt = document.getElementById('amountInput');
const hint= document.getElementById('remainingHint');
sel.addEventListener('change', () => {
  const rem = sel.options[sel.selectedIndex]?.dataset?.remaining || 0;
  amt.value = rem;
  hint.textContent = `Số tiền còn nợ: ${parseInt(rem).toLocaleString('vi')} ₫`;
});
</script>
{% endblock %}
