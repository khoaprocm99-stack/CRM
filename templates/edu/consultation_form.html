{% extends "edu/base_edu.html" %}
{% block title %}Ghi nhận tư vấn{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-chat-dots me-2"></i>Ghi nhận tư vấn học viên</h1>
</div>
<div class="bg-white rounded-3 shadow-sm p-4" style="max-width:620px">
  <form method="post">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Học viên *</label>
        <select name="student_id" class="form-select" required>
          {% for s in students_list %}
          <option value="{{ s.StudentID }}" {{ 'selected' if consult and consult.StudentID==s.StudentID }}>
            {{ s.FullName }} — {{ s.Phone }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Nhân viên tư vấn *</label>
        <select name="staff_id" class="form-select" required>
          {% for s in staff_list %}
          <option value="{{ s.StaffID }}" {{ 'selected' if consult and consult.StaffID==s.StaffID }}>
            {{ s.FullName }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Hình thức</label>
        <select name="type" class="form-select">
          {% for t in ['Gọi điện','Gặp mặt','Zalo','Email','Demo'] %}
          <option value="{{ t }}" {{ 'selected' if consult and consult.Type==t }}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Kết quả</label>
        <select name="result" class="form-select">
          {% for r in ['Quan tâm','Cần suy nghĩ','Đã đăng ký','Không quan tâm'] %}
          <option value="{{ r }}" {{ 'selected' if consult and consult.Result==r }}>{{ r }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Chủ đề *</label>
        <input type="text" name="subject" class="form-control" required
               value="{{ consult.Subject if consult else '' }}"
               placeholder="VD: Tư vấn khóa Python cơ bản">
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Nội dung tư vấn</label>
        <textarea name="notes" class="form-control" rows="3">{{ consult.Notes if consult else '' }}</textarea>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Bước tiếp theo</label>
        <input type="text" name="next_action" class="form-control"
               value="{{ consult.NextAction if consult else '' }}"
               placeholder="VD: Gọi lại sau 3 ngày, mời dự demo class">
      </div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Lưu</button>
      <a href="{{ url_for('edu_consultations') }}" class="btn btn-outline-secondary">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
